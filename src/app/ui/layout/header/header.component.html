<mat-toolbar
  color="primary"
  class="d-flex justify-content-between mat-toolbar"
  style="border-radius: 0 0 15px 15px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2)"
>
  <button mat-icon-button [matMenuTriggerFor]="menu" style="color: #fff">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="goHome()">
      <mat-icon>home</mat-icon>
      <span class="label-bold-1">Strona główna</span>
    </button>
    <button mat-menu-item (click)="openCalculator()">
      <mat-icon>calculate</mat-icon>
      <span class="label-bold-1">Kalkulator</span>
    </button>
    <button mat-menu-item [routerLink]="['/home/sudoku']">
      <mat-icon>calculate</mat-icon>
      <span class="label-bold-1">Sudoku</span>
    </button>
    <mat-divider></mat-divider>
    <div class="version-info label-1 text-center">ver. {{ version }}</div>
  </mat-menu>

  <span style="font-size: 1.5em; font-weight: bold; color: #fff">{{
    "header_title" | translate : { userName: userName }
  }}</span>

  <span class="expander"></span>

  <button mat-button class="language-button" [matMenuTriggerFor]="langMenu">
    {{ selectedLang === "pl" ? "🇵🇱" : "🇬🇧" }}
  </button>
  <mat-menu #langMenu="matMenu">
    <button class="language-button" mat-menu-item (click)="onLangChange('pl')">
      <span class="language-item">🇵🇱 {{ "language_polish" | translate }}</span>
    </button>
    <button class="language-button" mat-menu-item (click)="onLangChange('en')">
      <span class="language-item">🇬🇧 {{ "language_english" | translate }}</span>
    </button>
  </mat-menu>
</mat-toolbar>
