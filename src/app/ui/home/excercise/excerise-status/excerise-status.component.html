<div class="status-container d-flex flex-column align-center justify-center">
  @if(isCorrect) {
  <div class="correct d-flex flex-column align-center">
    <img [src]="successImage" alt="Happy dog" class="result-image" />
    <i class="fas fa-check-circle"></i>
    <h2>{{ successMessage.title }}</h2>
    <p>{{ successMessage.message }}</p>
  </div>
  } @else {
  <div class="incorrect d-flex flex-column align-center">
    <img [src]="failureImage" alt="Sad cat" class="result-image" />
    <i class="fas fa-times-circle"></i>
    <h2 class="text-center">{{ failureMessage.title }}</h2>
    <p class="mat-h2">Poprawna odpowiedź to:</p>
    <h2 class="mat-h2">{{ correctAnswer }}</h2>
    <p class="mat-h2 text-center">{{ failureMessage.message }}</p>
  </div>
  }
</div>
