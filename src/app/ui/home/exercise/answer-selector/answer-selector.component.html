<div class="answer-selector">
  @for (answer of answers; track $index) {
  <button
    [disabled]="disabled"
    mat-flat-button
    class="answer-button"
    [class.selected]="selectedAnswerValue === answer"
    [class.correct]="selectedAnswerValue === correctAnswer"
    (click)="selectAnswer(answer)"
  >
    {{ answer }}
  </button>
  }
</div>
